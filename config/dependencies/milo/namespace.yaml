apiVersion: v1
kind: Namespace
metadata:
  name: milo-system
  labels:
    app.kubernetes.io/name: milo
    app.kubernetes.io/managed-by: kustomize
# milo's overlays/test-infra targets milo-system (via spec.namespace).
# Flux does not auto-create a target namespace for a Kustomization, so
# we pre-create it here alongside the OCIRepository + Flux Kustomization.
