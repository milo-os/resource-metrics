# Kubeconfig that the resource-metrics controller uses to talk to the
# milo-apiserver. The base config defaults to the in-cluster
# ServiceAccount kubeconfig (kind apiserver), which does not serve milo's
# resourcemanager.miloapis.com group — so without this, the controller
# can't list Projects.
#
# - server: in-cluster Service for milo-apiserver. The pod listens on
#   port 6443 with a self-signed cert, so we skip TLS verification.
#   This bypasses the envoy gateway so we don't depend on the gateway
#   being healthy for the controller to start.
# - token: the static `test-admin-token` that milo's overlays/test-infra
#   wires into the apiserver's token-auth-file (config/overlays/
#   test-infra/components/auth/auth-tokens-secret.yaml in milo). The
#   token grants system:masters in the test environment.
#
# This is a test-overlay-only construct; production deployments should
# generate a least-privilege token (or use mTLS) and project this Secret
# from a sealed-secret / external secret store.
apiVersion: v1
kind: Secret
metadata:
  name: milo-kubeconfig
  namespace: resource-metrics-system
type: Opaque
stringData:
  kubeconfig: |
    apiVersion: v1
    kind: Config
    clusters:
    - name: milo
      cluster:
        server: https://milo-apiserver.milo-system.svc.cluster.local:6443
        insecure-skip-tls-verify: true
    users:
    - name: milo-admin
      user:
        token: test-admin-token
    contexts:
    - name: milo
      context:
        cluster: milo
        user: milo-admin
    current-context: milo
