# test-infra overlay patches for the resource-metrics manager Deployment.
#
# The base Deployment (config/manager/manager.yaml) already wires:
#   * the --server-config=/config/service-config.yaml flag
#   * a `service-config` volume mounted at /config, backed by the
#     `resource-metrics-service-config` ConfigMap
#
# This overlay re-declares those so it's self-documenting at the overlay
# level and so changes to the base default don't silently drop the
# e2e wiring. The content of the ConfigMap is substituted by
# configMapGenerator(behavior: replace) in kustomization.yaml pointing at
# server-config.yaml. We also set imagePullPolicy so the locally-loaded
# kind image is picked up.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-metrics-controller-manager
spec:
  template:
    spec:
      containers:
        - name: manager
          imagePullPolicy: IfNotPresent
          # Point ctrl.GetConfigOrDie() (used to build the local cluster
          # passed to mcmanager.New) at the milo apiserver. The kind
          # apiserver is just the pod host — the controller's actual
          # control plane (CRD, ResourceMetricsPolicy resources, leader
          # lease, …) lives on milo. Without this, ctrl.GetConfigOrDie()
          # falls back to the in-cluster ServiceAccount, which targets
          # the kind apiserver — so the policy watch sets up against the
          # wrong cluster and never receives events.
          env:
            - name: KUBECONFIG
              value: /etc/milo/kubeconfig
          args:
            # --leader-elect intentionally omitted: a single replica
            # doesn't need it, and the lease would otherwise need a
            # namespace on milo (controller-runtime defaults to the
            # pod's k8s namespace, which doesn't exist on milo).
            - --health-probe-bind-address=:8081
            - --server-config=/etc/resource-metrics/server.yaml
            # Verbose multicluster + controller-runtime logging — useful
            # while diagnosing why the policy informer isn't delivering
            # events. Drop back to default once stable.
            - --zap-log-level=debug
          volumeMounts:
            # Re-mount the base `service-config` volume at
            # /etc/resource-metrics so the --server-config path matches.
            # The base also mounts the same volume at /config; kustomize
            # strategic merge keys volumeMounts by (name, mountPath), so
            # both mounts coexist — harmless, the manager only reads the
            # path passed to --server-config.
            - name: service-config
              mountPath: /etc/resource-metrics
              readOnly: true
            # Milo kubeconfig: the controller reads this to discover
            # Projects (and to reach project control planes) via the
            # milo-apiserver instead of the kind apiserver. Paths here
            # match discovery.discoveryKubeconfigPath and
            # discovery.projectKubeconfigPath in server-config.yaml.
            - name: milo-kubeconfig
              mountPath: /etc/milo
              readOnly: true
      volumes:
        - name: milo-kubeconfig
          secret:
            secretName: milo-kubeconfig
