apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: resource-metrics
    app.kubernetes.io/managed-by: kustomize
    infra.datum.net/inject-datum-control-plane-trust-bundle: ""
  name: resource-metrics-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-metrics-controller-manager
  namespace: resource-metrics-system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: resource-metrics
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: resource-metrics
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: resource-metrics
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
          - --server-config=/config/config.yaml
        image: ghcr.io/milo-os/resource-metrics:latest
        name: manager
        ports: []
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 1
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
          - name: service-config
            mountPath: /config
      volumes:
        - name: service-config
          configMap:
            name: resource-metrics-service-config
      serviceAccountName: resource-metrics-controller-manager
      terminationGracePeriodSeconds: 10
