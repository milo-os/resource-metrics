version: '3'

dotenv: ['.env']

vars:
  TOOL_DIR: "{{.USER_WORKING_DIR}}/bin"
  # Tracking datum-cloud/test-infra#28 (feat/composable-observability) while
  # the PR is under review — it splits install-observability into per-
  # component tasks so kind CI can skip Grafana/Loki/Tempo. Bump back to a
  # semver tag once the PR merges and a release is cut.
  TEST_INFRA_REPO_REF: 'feat/composable-observability'
  TEST_INFRA_CLUSTER_NAME: 'test-infra'
  IMG_NAME: 'ghcr.io/datum-cloud/resource-metrics'
  IMG_TAG: 'dev'
  IMG: '{{.IMG_NAME}}:{{.IMG_TAG}}'
  # Milo publishes oci://ghcr.io/datum-cloud/milo-kustomize from the
  # build-apiserver workflow. Two tag schemes exist:
  #   * Semver releases (e.g. v0.24.3) — used in production/staging infra.
  #   * Per-merge branch tags v0.0.0-<branch> (and v0.0.0-main-<timestamp>).
  # We pin to the most recent semver tag confirmed via
  # `infra/apps/datum-control-plane-system/.../production/milo-oci-repository-patch.yaml`,
  # which contains `overlays/test-infra` as of milo commit 4c62124d.
  # Bump this deliberately alongside test-infra and other sibling repos.
  # Temporarily on the v0.0.0-main floating tag — v0.24.3 was cut before
  # the multi-arch publish (2026-04-16), so arm64 kind clusters on macOS
  # get ImagePullBackOff. Revert to a semver once one is cut post multi-arch.
  MILO_REPO_REF: 'v0.0.0-main'
  # v0.2.12 fails to compile under Go 1.25 (testing.testDeps interface
  # gained a ModulePath method). v0.2.14 is the first release that compiles
  # cleanly. Bump this when a newer chainsaw is desired.
  CHAINSAW_VERSION: 'v0.2.14'

includes:
  # Remote taskfile from datum-cloud/test-infra. Requires
  # TASK_X_REMOTE_TASKFILES=1 in the environment. The pin lives in
  # TEST_INFRA_REPO_REF and is bumped deliberately alongside sibling
  # provider repos.
  test-infra:
    taskfile: https://raw.githubusercontent.com/datum-cloud/test-infra/{{.TEST_INFRA_REPO_REF}}/Taskfile.yml
    flatten: false
    vars:
      REPO_REF: '{{.TEST_INFRA_REPO_REF}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install-tools:
    desc: Install required development tools into ./bin (chainsaw)
    silent: true
    cmds:
      - |
        set -e
        mkdir -p {{.TOOL_DIR}}

        # We download the prebuilt chainsaw release rather than `go install`
        # because chainsaw's runner package doesn't compile under Go 1.25
        # (testing.testDeps gained a ModulePath method that chainsaw's
        # internal TestDeps shim doesn't implement — reproducible through at
        # least v0.2.15-beta.3). Prebuilt releases are built with an older
        # Go toolchain and are unaffected.
        if [ ! -f "{{.TOOL_DIR}}/chainsaw-{{.CHAINSAW_VERSION}}" ]; then
          echo "Installing chainsaw {{.CHAINSAW_VERSION}}..."
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          case "$(uname -m)" in
            x86_64) arch=amd64 ;;
            aarch64|arm64) arch=arm64 ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          url="https://github.com/kyverno/chainsaw/releases/download/{{.CHAINSAW_VERSION}}/chainsaw_${os}_${arch}.tar.gz"
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          curl -fsSL "$url" | tar -xz -C "$tmpdir"
          mv "$tmpdir/chainsaw" "{{.TOOL_DIR}}/chainsaw-{{.CHAINSAW_VERSION}}"
          chmod +x "{{.TOOL_DIR}}/chainsaw-{{.CHAINSAW_VERSION}}"
        fi
        ln -sf {{.TOOL_DIR}}/chainsaw-{{.CHAINSAW_VERSION}} {{.TOOL_DIR}}/chainsaw
    status:
      - test -f {{.TOOL_DIR}}/chainsaw-{{.CHAINSAW_VERSION}}
      - test -L {{.TOOL_DIR}}/chainsaw

  test:
    desc: Run Go tests
    cmds:
      - go test -timeout 5m ./... -count=1
    silent: false

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...
    silent: false

  dev:build:
    desc: Build the resource-metrics container image for development
    silent: true
    cmds:
      - |
        set -e
        echo "Building resource-metrics container image: {{.IMG}}"

        GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
        VERSION="v0.0.0-dev+${GIT_COMMIT:0:7}"
        GIT_TREE_STATE="clean"
        if [ -n "$(git status --porcelain 2>/dev/null)" ]; then
          GIT_TREE_STATE="dirty"
        fi
        BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "unknown")

        docker build \
          --build-arg VERSION="${VERSION}" \
          --build-arg GIT_COMMIT="${GIT_COMMIT}" \
          --build-arg GIT_TREE_STATE="${GIT_TREE_STATE}" \
          --build-arg BUILD_DATE="${BUILD_DATE}" \
          -f "{{.USER_WORKING_DIR}}/Dockerfile" \
          -t "{{.IMG}}" \
          "{{.USER_WORKING_DIR}}"
        echo "Successfully built {{.IMG}}"

  dev:load:
    desc: Load the resource-metrics image into the kind cluster
    silent: true
    cmds:
      - |
        set -e
        echo "Loading image {{.IMG}} into kind cluster '{{.TEST_INFRA_CLUSTER_NAME}}'..."
        kind load docker-image "{{.IMG}}" --name "{{.TEST_INFRA_CLUSTER_NAME}}"

  test:install-dependencies:
    desc: Install milo via Flux OCIRepository + observability stack.
    silent: true
    cmds:
      - |
        set -e
        echo "Applying milo dependency kustomization..."
        task test-infra:kubectl -- apply -k config/dependencies/milo
      - |
        set -e
        echo "Waiting for Flux OCIRepository 'milo' to reconcile..."
        task test-infra:kubectl -- -n flux-system wait ocirepository/milo \
          --for=condition=Ready --timeout=180s
        echo "Waiting for Flux Kustomization 'milo' to reconcile (up to 10m)..."
        # On a cold kind cluster the milo overlay has to apply CRDs,
        # bring up etcd via Helm, and wait for the apiserver + controller
        # manager to roll out. 10m gives us headroom; the Kustomization's
        # own timeout is 5m but this wait polls until Ready=True.
        if ! task test-infra:kubectl -- -n flux-system wait kustomization/milo \
            --for=condition=Ready --timeout=600s; then
          echo "Kustomization milo did not become Ready. Dumping status:" >&2
          task test-infra:kubectl -- -n flux-system get kustomization milo -o yaml >&2 || true
          task test-infra:kubectl -- -n milo-system get pods,deploy,helmreleases -o wide >&2 || true
          task test-infra:kubectl -- -n milo-system describe helmrelease --all >&2 || true
          exit 1
        fi
      # cert-manager's cainjector ships with a 64Mi memory limit that
      # OOMs on a cluster with many webhook consumers (milo + OTel
      # Operator + friends). Without cainjector, caBundles on
      # ValidatingWebhookConfiguration/MutatingWebhookConfiguration
      # stay empty, so admission webhooks fail with "x509: certificate
      # signed by unknown authority". Symptom: install-otel-collector
      # retry loop eventually exhausts. Bump to 256Mi BEFORE installing
      # OTel Collector so cainjector can keep up with the webhook
      # churn. Fix upstream in test-infra's cert-manager HelmRelease
      # values eventually.
      - |
        set -e
        echo "Bumping cert-manager-cainjector memory limit to 256Mi..."
        task test-infra:kubectl -- -n cert-manager patch deployment cert-manager-cainjector --type=json \
          -p='[{"op":"replace","path":"/spec/template/spec/containers/0/resources/limits/memory","value":"256Mi"}]'
        task test-infra:kubectl -- -n cert-manager rollout status deployment/cert-manager-cainjector --timeout=90s
      # Install only the observability components we need for the e2e
      # suite: VictoriaMetrics (target for OTLP remote-write) and the
      # OpenTelemetry Collector (OTLP receiver). Grafana/Loki/Tempo are
      # skipped — the single-node kind CI runner can't keep the full
      # stack healthy in parallel with milo + the controller under test.
      #
      # install-otel-collector has a race: it waits for the
      # OpenTelemetryCollector CRD `Established` condition and then
      # applies a v1beta1 CR, but the conversion webhook often isn't
      # registered yet — the apply fails with "no matches for kind".
      # Retry up to 5x over 5 minutes; the webhook is usually healthy
      # within 60s.
      - task --yes test-infra:install-victoria-metrics
      - |
        set -e
        attempts=0
        until task --yes test-infra:install-otel-collector; do
          attempts=$((attempts+1))
          if [ "$attempts" -ge 5 ]; then
            echo "install-otel-collector failed after $attempts attempts" >&2
            exit 1
          fi
          echo "install-otel-collector attempt $attempts failed; waiting 30s before retry" >&2
          sleep 30
        done

  test:deploy:
    desc: Deploy resource-metrics via the test-infra overlay.
    silent: true
    cmds:
      # Apply the full overlay (Deployment, ServiceAccount, milo-kubeconfig
      # Secret, ConfigMap, …) to the kind cluster — kind is the pod host.
      - task test-infra:kubectl -- apply -k config/overlays/test-infra
      # Install our CRD on milo. The controller's local manager points at
      # milo (KUBECONFIG=/etc/milo/kubeconfig in the deployment patch), so
      # the ResourceMetricsPolicy watch source is set up against milo —
      # the CRD must exist there for the watch to deliver events.
      # We use the same milo kubeconfig the controller uses; the
      # test-admin-token grants system:masters so kubectl apply works
      # without any extra RBAC on milo.
      - kubectl --kubeconfig "{{.USER_WORKING_DIR}}/.test-infra/milo-kubeconfig" apply -f config/crd/bases
      - task test-infra:kubectl -- -n resource-metrics-system rollout status deployment/resource-metrics-controller-manager --timeout=180s

  test:milo-kubeconfig:
    desc: Generate a kubeconfig that targets milo-apiserver via the test-infra envoy gateway.
    silent: true
    # The chainsaw e2e suite applies resourcemanager.miloapis.com APIs
    # (Organization, Project, …) which are served by the milo-apiserver
    # pod, not the kind apiserver. milo's overlays/test-infra exposes
    # the apiserver via an HTTPRoute on the merged envoy gateway
    # (NodePort 30443 -> port 8443 inside the gateway pod). The test
    # token (`test-admin-token` -> system:masters) lives in Secret
    # milo-apiserver-auth-tokens in milo-system; it is created by
    # milo's overlays/test-infra/components/auth/auth-tokens-secret.yaml
    # and is intended for test harnesses.
    cmds:
      - |
        set -euo pipefail
        kind_kubeconfig="{{.USER_WORKING_DIR}}/.test-infra/kubeconfig"
        out="{{.USER_WORKING_DIR}}/.test-infra/milo-kubeconfig"
        if [ ! -f "$kind_kubeconfig" ]; then
          echo "ERROR: $kind_kubeconfig not found. Run 'task test:setup' first." >&2
          exit 1
        fi
        token=$(kubectl --kubeconfig "$kind_kubeconfig" -n milo-system \
          get secret milo-apiserver-auth-tokens \
          -o jsonpath='{.data.tokens\.csv}' | base64 -d \
          | awk -F',' '$2=="admin"{print $1; exit}')
        if [ -z "$token" ]; then
          echo "ERROR: admin token not found in milo-apiserver-auth-tokens" >&2
          exit 1
        fi
        cat > "$out" <<EOF
        apiVersion: v1
        kind: Config
        clusters:
        - name: milo-test-infra
          cluster:
            server: https://localhost:30443
            insecure-skip-tls-verify: true
        users:
        - name: milo-admin
          user:
            token: ${token}
        contexts:
        - name: milo-test-infra
          context:
            cluster: milo-test-infra
            user: milo-admin
        current-context: milo-test-infra
        EOF
        chmod 600 "$out"
        echo "Wrote milo kubeconfig to $out"

  test:setup:
    desc: Bring up kind, install dependencies, build/load images, deploy test overlay.
    silent: true
    cmds:
      - task: test-infra:cluster-up
      - task: test:install-dependencies
      - task: dev:build
      - task: dev:load
      # milo-kubeconfig MUST be generated before test:deploy, since
      # test:deploy uses it to apply the CRD on milo.
      - task: test:milo-kubeconfig
      - task: test:deploy

  e2e:
    desc: Run chainsaw e2e tests against test/e2e.
    silent: true
    deps: [install-tools]
    cmds:
      # KUBECONFIG is the kind kubeconfig (default cluster) because the
      # controller and our resourcemetrics.miloapis.com CRD live on kind.
      # The milo kubeconfig is registered as a named chainsaw cluster
      # ("milo") so fixtures that apply resourcemanager.miloapis.com
      # resources (Organization, Project, …) can target it explicitly.
      # MILO_KUBECONFIG is exported so chainsaw setup scripts that derive
      # a per-project kubeconfig via `sed` on the server URL can read
      # the milo kubeconfig directly — the rewritten URL appends the
      # project-CP path prefix that milo recognizes on the same gateway
      # endpoint.
      - |
        set -e
        export KUBECONFIG="{{.USER_WORKING_DIR}}/.test-infra/kubeconfig"
        milo_kubeconfig="{{.USER_WORKING_DIR}}/.test-infra/milo-kubeconfig"
        export MILO_KUBECONFIG="${milo_kubeconfig}"
        if [ ! -f "${KUBECONFIG}" ] || [ ! -f "${milo_kubeconfig}" ]; then
          echo "ERROR: kubeconfigs missing. Run 'task test:setup' first." >&2
          exit 1
        fi
        {{.TOOL_DIR}}/chainsaw test test/e2e \
          --cluster milo=${milo_kubeconfig} \
          --config test/e2e/.chainsaw.yaml

  test:teardown:
    desc: Tear down the kind cluster created by test:setup.
    silent: true
    cmds:
      - task: test-infra:cluster-down
