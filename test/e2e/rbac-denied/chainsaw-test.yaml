apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: rbac-denied
spec:
  description: |
    A policy targeting apps/v1 Deployments on a project CP where nothing
    aggregates the required verbs onto
    resourcemetrics.miloapis.com:aggregated-reader must report
    PermissionDenied=True with the Deployment GVR listed in
    status.missingPermissions.

    This test INTENTIONALLY omits the configmap aggregation label. It
    also defensively removes any deployment-aggregation ClusterRole a
    prior (buggy) run might have left behind before asserting.

  clusters:
    project-cp:
      kubeconfig: ./.project-cp.kubeconfig

  steps:
    - name: prerequisites (org, project, project-cp kubeconfig)
      try:
        - apply:
            cluster: milo
            file: ../fixtures/organization.yaml
        - apply:
            cluster: milo
            file: ../fixtures/project.yaml
        - assert:
            cluster: milo
            timeout: 120s
            resource:
              apiVersion: resourcemanager.miloapis.com/v1alpha1
              kind: Project
              metadata:
                name: e2e-alpha
              (length((status.conditions || `[]`)[?type == 'Ready' && status == 'True']) > `0`): true
        - script:
            timeout: 30s
            content: |
              set -eu
              src="${MILO_KUBECONFIG:-$PWD/.test-infra/milo-kubeconfig}"
              base_server=$(kubectl --kubeconfig "$src" config view --raw -o jsonpath='{.clusters[?(@.name=="'"$(kubectl --kubeconfig "$src" config view --raw -o jsonpath='{.contexts[?(@.name=="'"$(kubectl --kubeconfig "$src" config current-context)"'")].context.cluster}')"'")].cluster.server}')
              new_server="${base_server%/}/apis/resourcemanager.miloapis.com/v1alpha1/projects/e2e-alpha/control-plane"
              kubectl --kubeconfig "$src" config view --raw --flatten \
                | sed -E "s#server: ${base_server}\$#server: ${new_server}#" \
                > ./.project-cp.kubeconfig

    - name: defensively unlabel any pre-existing deployment reader role
      try:
        - script:
            timeout: 30s
            content: |
              set -eu
              # Any ClusterRole on the project CP that currently grants
              # deployments get/list/watch AND carries the aggregation
              # label would make the test pass spuriously. Strip the
              # label if present. We don't delete the role (we don't own
              # the naming), just the label.
              kubectl --kubeconfig ./.project-cp.kubeconfig get clusterroles \
                -l 'resourcemetrics.miloapis.com/aggregate-to-reader=true' \
                -o name \
                | while read -r role; do
                    if kubectl --kubeconfig ./.project-cp.kubeconfig get "$role" -o json \
                        | grep -q '"deployments"'; then
                      kubectl --kubeconfig ./.project-cp.kubeconfig label "$role" \
                        'resourcemetrics.miloapis.com/aggregate-to-reader-' --overwrite
                    fi
                  done

    - name: apply the policy and assert PermissionDenied
      try:
        - apply:
            cluster: milo
            file: policy.yaml
        - assert:
            cluster: milo
            # Allow time: ~30s cache-sync timeout + 10s requeue + margin.
            timeout: 90s
            resource:
              apiVersion: resourcemetrics.miloapis.com/v1alpha1
              kind: ResourceMetricsPolicy
              metadata:
                name: e2e-rbac-denied
              status:
                (length((conditions || `[]`)[?type == 'PermissionDenied' && status == 'True']) > `0`): true
                # At least one of the missing GVRs must be the one we
                # targeted — guards against the controller reporting
                # missing permissions for some unrelated kind. The
                # `missingPermissions || [] ` form coalesces nil to an
                # empty array; without it length() errors when the
                # status hasn't yet been written.
                (length((missingPermissions || `[]`)[?group == 'apps' && resource == 'deployments' && version == 'v1']) > `0`): true

  # Auto-cleanup via skipDelete: false in .chainsaw.yaml.
