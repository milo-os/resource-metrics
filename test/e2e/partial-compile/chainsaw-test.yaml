apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: partial-compile
spec:
  description: |
    A policy with one valid and one broken generator must run the valid
    one (activeGenerators == 1) and surface the broken one
    (compilationFailures == 1, InvalidCEL=True, Degraded=True).

  clusters:
    project-cp:
      kubeconfig: ./.project-cp.kubeconfig

  steps:
    - name: prerequisites (org, project, project-cp kubeconfig, aggregation)
      try:
        - apply:
            cluster: milo
            file: ../fixtures/organization.yaml
        - apply:
            cluster: milo
            file: ../fixtures/project.yaml
        - assert:
            cluster: milo
            timeout: 120s
            resource:
              apiVersion: resourcemanager.miloapis.com/v1alpha1
              kind: Project
              metadata:
                name: e2e-alpha
              (length((status.conditions || `[]`)[?type == 'Ready' && status == 'True']) > `0`): true
        - script:
            timeout: 30s
            content: |
              set -eu
              src="${MILO_KUBECONFIG:-$PWD/.test-infra/milo-kubeconfig}"
              base_server=$(kubectl --kubeconfig "$src" config view --raw -o jsonpath='{.clusters[?(@.name=="'"$(kubectl --kubeconfig "$src" config view --raw -o jsonpath='{.contexts[?(@.name=="'"$(kubectl --kubeconfig "$src" config current-context)"'")].context.cluster}')"'")].cluster.server}')
              new_server="${base_server%/}/apis/resourcemanager.miloapis.com/v1alpha1/projects/e2e-alpha/control-plane"
              kubectl --kubeconfig "$src" config view --raw --flatten \
                | sed -E "s#server: ${base_server}\$#server: ${new_server}#" \
                > ./.project-cp.kubeconfig
        - apply:
            cluster: project-cp
            file: ../fixtures/aggregation-labels.yaml

    - name: apply the policy and assert partial-compile status
      try:
        - apply:
            cluster: milo
            file: policy.yaml
        - assert:
            cluster: milo
            timeout: 30s
            resource:
              apiVersion: resourcemetrics.miloapis.com/v1alpha1
              kind: ResourceMetricsPolicy
              metadata:
                name: e2e-partial-compile
              status:
                activeGenerators: 1
                compilationFailures: 1
                (length((conditions || `[]`)[?type == 'InvalidCEL' && status == 'True']) > `0`): true
                (length((conditions || `[]`)[?type == 'Degraded' && status == 'True']) > `0`): true
                # A partially-compiled policy must NOT be reported Ready.
                (length((conditions || `[]`)[?type == 'Ready' && status == 'False']) > `0`): true

  # Auto-cleanup via skipDelete: false in .chainsaw.yaml.
