name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          # v2.1.2 was built with go1.24; our module declares go 1.25.0
          # via the cel.dev/expr transitive dep. Use a newer release
          # compiled against go 1.25+.
          version: v2.5.0
