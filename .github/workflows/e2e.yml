# End-to-end integration suite: brings up kind via test-infra, installs milo
# and the observability stack, builds/loads the resource-metrics image,
# deploys the test-infra overlay, and runs the chainsaw suite in test/e2e.
#
# Runs on every PR and on pushes to main. Cancels in-flight runs on
# force-push because kind + milo + chainsaw is ~10-15 minutes cold.
name: e2e

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run chainsaw e2e suite
    runs-on: ubuntu-latest
    # Cold kind + milo bundle + Helm-driven observability stack takes
    # ~25–30 min before chainsaw even starts. 45 min gives chainsaw
    # room to run its scenarios on top.
    timeout-minutes: 45
    env:
      # The root Taskfile remote-includes datum-cloud/test-infra; required
      # for `task test:setup` / `task test:teardown` to resolve includes.
      TASK_X_REMOTE_TASKFILES: '1'
      # Point every bare `kubectl` (e.g. in the diagnostics step) at the
      # kind cluster that test-infra:cluster-up writes out. `task test-infra:*`
      # handles this internally, but the diagnostics bash block runs kubectl
      # directly.
      KUBECONFIG: ${{ github.workspace }}/.test-infra/kubeconfig
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools (chainsaw)
        run: task --yes install-tools

      - name: Bring up cluster and deploy resource-metrics
        run: task --yes test:setup

      - name: Run chainsaw e2e suite
        run: task --yes e2e

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p diagnostics
          {
            echo "=== kubeconfig sanity ==="
            echo "KUBECONFIG=${KUBECONFIG:-<unset>}"
            test -f "${KUBECONFIG:-}" && echo "kubeconfig exists" || echo "kubeconfig MISSING"
            kubectl cluster-info || true
            echo
            echo "=== cluster events (sorted) ==="
            kubectl get events -A --sort-by=.lastTimestamp || true
            echo
            echo "=== flux OCIRepository (milo) ==="
            kubectl -n flux-system get ocirepository milo -o yaml || true
            echo
            echo "=== flux Kustomization (milo) ==="
            kubectl -n flux-system get kustomization milo -o yaml || true
            echo
            echo "=== all flux resources (flux-system, milo-system) ==="
            kubectl get kustomizations,ocirepositories,helmreleases,helmcharts,helmrepositories -A -o wide || true
            echo
            echo "=== milo-system pods + deploys + helmreleases ==="
            kubectl -n milo-system get pods,deploy,statefulset,helmreleases -o wide || true
            kubectl -n milo-system describe helmreleases --all 2>/dev/null || true
            echo
            echo "=== flux controllers logs (last 200 lines each) ==="
            for d in source-controller kustomize-controller helm-controller; do
              echo "--- $d ---"
              kubectl -n flux-system logs deployment/$d --tail=200 || true
            done
            echo
            echo "=== resource-metrics deployment ==="
            kubectl -n resource-metrics-system describe deployment/resource-metrics-controller-manager || true
            echo
            echo "=== resource-metrics pods ==="
            kubectl -n resource-metrics-system get pods -o wide || true
            kubectl -n resource-metrics-system describe pod -l control-plane=controller-manager || true
            echo
            echo "=== resource-metrics logs ==="
            kubectl -n resource-metrics-system logs -l control-plane=controller-manager --tail=500 --all-containers=true || true
          } > diagnostics/cluster-state.log 2>&1

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics-${{ github.run_id }}
          path: diagnostics/
          if-no-files-found: ignore
          retention-days: 14

      - name: Teardown cluster
        if: always()
        continue-on-error: true
        run: task --yes test:teardown
