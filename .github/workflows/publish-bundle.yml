name: publish-bundle

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-image:
    permissions:
      id-token: write
      contents: read
      packages: write
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/datum-labs/resource-metrics
          tags: |
            type=ref,event=branch,suffix=-{{commit_date 'YYYYMMDD-HHmmss'}},prefix=v0.0.0-
            type=ref,event=branch,prefix=v0.0.0-
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=sha,prefix=v0.0.0-

      - name: Extract version tag
        id: version-tag
        run: |
          FULL_TAG="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          echo "tag=${FULL_TAG##*:}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-kustomize-bundles:
    needs: build-image
    permissions:
      id-token: write
      contents: read
      packages: write
    uses: datum-cloud/actions/.github/workflows/publish-kustomize-bundle.yaml@v1.13.1
    with:
      bundle-name: ghcr.io/datum-labs/resource-metrics-kustomize
      bundle-path: config
      image-overlays: config/manager
      image-name: ghcr.io/datum-labs/resource-metrics
    secrets: inherit
